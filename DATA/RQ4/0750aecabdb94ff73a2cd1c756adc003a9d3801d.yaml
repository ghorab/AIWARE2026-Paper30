apiVersion: v1
kind: Service
metadata:
  name: plex-app
  namespace: plex
  labels:
    app.kubernetes.io/name: plex
spec:
  type: ClusterIP
  ports:
    - name: plex
      port: 32400
      targetPort: 32400
    - name: plex-network-discovery-0
      port: 32410
      targetPort: 32410
      protocol: UDP
    - name: plex-network-discovery-2
      port: 32412
      targetPort: 32412
      protocol: UDP
    - name: plex-network-discovery-3
      port: 32413
      targetPort: 32413
      protocol: UDP
    - name: plex-network-discovery-4
      port: 32414
      targetPort: 32414
      protocol: UDP
  selector:
    app.kubernetes.io/name: plex